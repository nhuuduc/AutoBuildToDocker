version: '3.8'

services:
  app:
    build: .
    container_name: cicd-telegram-bot
    environment:
      - NODE_ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # GitHub Container Registry — images stored at ghcr.io/<DOCKER_USERNAME>/<image>
      - DOCKER_REGISTRY=${DOCKER_REGISTRY:-ghcr.io}
      - DOCKER_USERNAME=${DOCKER_USERNAME}
      # Leave DOCKER_PASSWORD unset to use GITHUB_TOKEN automatically for ghcr.io
      - DOCKER_PASSWORD=${DOCKER_PASSWORD:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DB_PATH=/app/data/app.db
      - WORK_DIR=/builds
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-60}
      - PORT=3000
      - BUILDER_REPO=${BUILDER_REPO:-nhuuduc/AutoBuildToDocker}
      - ALLOWED_TELEGRAM_IDS=${ALLOWED_TELEGRAM_IDS:-}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./builds:/builds
    restart: unless-stopped
    ports:
      - "3000:3000"
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  default:
    name: cicd-network
