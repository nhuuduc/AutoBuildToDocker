name: Build & Push Docker Image

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Source GitHub repo (e.g. RightNow-AI/openfang)"
        required: true
      commit_sha:
        description: "Commit SHA to checkout"
        required: true
      image_name:
        description: "Docker image name (e.g. openfang)"
        required: true
      telegram_chat_id:
        description: "Telegram chat ID to notify"
        required: true
      features:
        description: "Comma-separated optional features (e.g. python3,playwright,nodejs,ffmpeg)"
        required: false
        default: ""
      platforms:
        description: "Comma-separated platforms (e.g. linux/amd64, linux/arm64, or linux/amd64,linux/arm64)"
        required: false
        default: "linux/amd64,linux/arm64"

env:
  REGISTRY: ghcr.io

jobs:
  # ── Compute which platforms to build ────────────────────────────────────────
  setup:
    name: Setup matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      slugs: ${{ steps.set.outputs.slugs }}
    steps:
      - name: Resolve platform matrix
        id: set
        run: |
          PLATFORMS="${{ inputs.platforms }}"
          # Build JSON array for matrix
          MATRIX="["
          SLUGS=""
          FIRST=true
          IFS=',' read -ra PARTS <<< "$PLATFORMS"
          for p in "${PARTS[@]}"; do
            p=$(echo "$p" | xargs)  # trim whitespace
            slug="${p//\//-}"       # linux/amd64 → linux-amd64
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              MATRIX+=","
              SLUGS+=","
            fi
            MATRIX+="{\"platform\":\"$p\",\"slug\":\"$slug\"}"
            SLUGS+="$slug"
          done
          MATRIX+="]"
          echo "matrix={\"include\":$MATRIX}" >> "$GITHUB_OUTPUT"
          echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
          echo "Matrix: $MATRIX"
          echo "Slugs: $SLUGS"

  # ── Build each platform in parallel — NO QEMU (Go cross-compile) ──────────
  build:
    name: Build (${{ matrix.slug }})
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.commit_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ matrix.slug }}-${{ inputs.commit_sha }}
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.slug }}-${{ inputs.repo }}
          cache-to: type=gha,scope=${{ matrix.slug }}-${{ inputs.repo }},mode=max

      - name: Build feature addon layer
        if: inputs.features != ''
        env:
          FEATURES: ${{ inputs.features }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}:${{ matrix.slug }}-${{ inputs.commit_sha }}
        run: |
          python3 - <<'PYEOF'
          import os, subprocess, sys
          image = os.environ["IMAGE"]
          # Auto-detect apk (Alpine) vs apt-get (Debian/Ubuntu) at build time
          _apk  = "command -v apk >/dev/null 2>&1"
          def _pkg(*pkgs_apk, deb=None):
              deb_pkgs = deb if deb else list(pkgs_apk)
              deb_cmd  = f"DEBIAN_FRONTEND=noninteractive apt-get install -y {' '.join(deb_pkgs)} && rm -rf /var/lib/apt/lists/*"
              return f"if {_apk}; then apk add --no-cache {' '.join(pkgs_apk)}; else apt-get update -qq && {deb_cmd}; fi"
          feature_cmds = {
            "python3":    [f"RUN {_pkg('python3', 'py3-pip', deb=['python3', 'python3-pip'])}"],
            "playwright": [f"RUN {_pkg('python3', 'py3-pip', 'chromium', 'chromium-chromedriver', deb=['python3', 'python3-pip', 'chromium'])}",
                           "RUN pip3 install --break-system-packages playwright",
                           "RUN playwright install chromium --with-deps"],
            "nodejs":     [f"RUN {_pkg('nodejs', 'npm')}"],
            "ffmpeg":     [f"RUN {_pkg('ffmpeg')}"],
          }
          features = [f.strip() for f in os.environ["FEATURES"].split(",") if f.strip()]
          lines = [f"FROM {image}"]
          for feat in features:
              lines.extend(feature_cmds.get(feat, []))
          dockerfile = "\n".join(lines) + "\n"
          with open("/tmp/Dockerfile.addon", "w") as f:
              f.write(dockerfile)
          print("Dockerfile.addon:\n" + dockerfile)
          PYEOF
          docker build --progress=plain -t "${IMAGE}" -f /tmp/Dockerfile.addon /tmp
          docker push "${IMAGE}"
          echo "✅ Addon layer pushed: ${IMAGE}"


  # ── Merge into multi-arch manifest + notify ────────────────────────────────
  merge:
    name: Merge & Notify
    runs-on: ubuntu-latest
    needs: [setup, build]
    permissions:
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        env:
          SHA: ${{ inputs.commit_sha }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          SLUGS: ${{ needs.setup.outputs.slugs }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          # Build list of source images from slugs
          IFS=',' read -ra SLUG_PARTS <<< "$SLUGS"
          SOURCES=""
          for slug in "${SLUG_PARTS[@]}"; do
            slug=$(echo "$slug" | xargs)
            SOURCES+=" ${IMAGE}:${slug}-${SHA}"
          done

          if [ $(echo "$SLUGS" | tr ',' '\n' | wc -l) -gt 1 ]; then
            # Multi-platform: create manifest list
            docker buildx imagetools create \
              --tag "${IMAGE}:latest" \
              --tag "${IMAGE}:${SHA}" \
              $SOURCES
            echo "✅ Multi-arch manifest pushed: ${IMAGE}:latest"
          else
            # Single platform: just re-tag
            SINGLE_TAG=$(echo "$SOURCES" | xargs)
            docker buildx imagetools create \
              --tag "${IMAGE}:latest" \
              --tag "${IMAGE}:${SHA}" \
              $SINGLE_TAG
            echo "✅ Single-platform image tagged: ${IMAGE}:latest"
          fi

      - name: Notify Telegram — Success
        env:
          SHA: ${{ inputs.commit_sha }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
          PLATFORMS: ${{ inputs.platforms }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ inputs.telegram_chat_id }}\",
              \"text\": \"✅ *Build Successful!*\n\n📦 *Repo:* \`${{ inputs.repo }}\`\n🔗 *Commit:* \`${SHA:0:7}\`\n🐳 *Image:* \`${IMAGE}:latest\`\n🖥️ Platforms: ${PLATFORMS}\n🔗 [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"

      - name: Notify Telegram — Failure
        if: failure()
        env:
          SHA: ${{ inputs.commit_sha }}
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ inputs.image_name }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${{ inputs.telegram_chat_id }}\",
              \"text\": \"❌ *Build Failed*\n\n📦 *Repo:* \`${{ inputs.repo }}\`\n🔗 *Commit:* \`${SHA:0:7}\`\n🔗 [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"parse_mode\": \"Markdown\"
            }"
